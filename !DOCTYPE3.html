<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배민 레시피 AI 플러스 | 다이렉트 링크 연결</title>
    <style>
        :root {
            --baemin-cyan: #2AC1BC;
            --white: #FFFFFF;
            --bg-gray: #F6F6F6;
            --yt-red: #FF0000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-gray); display: flex; justify-content: center; padding: 20px; height: 100vh; overflow: hidden; }
        
        .main-wrapper { display: flex; width: 100%; max-width: 1200px; gap: 20px; height: 90vh; }

        .recipe-section { flex: 1.6; background: var(--white); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .community-section { flex: 0.7; background: var(--white); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        header { padding: 15px; border-bottom: 1px solid #eee; text-align: center; background: #fff; }
        header h2 { color: var(--baemin-cyan); font-size: 18px; font-weight: 800; }

        .input-zone { background: #eefaf9; padding: 15px; border-bottom: 1px solid #eee; }
        .search-container { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-container input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline-color: var(--baemin-cyan); }
        .search-btn { background: var(--baemin-cyan); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        
        .ai-scan-btn { width: 100%; padding: 10px; background: white; border: 1px solid var(--baemin-cyan); color: var(--baemin-cyan); border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.2s; }
        .ai-scan-btn:hover { background: var(--baemin-cyan); color: white; }

        .loading-overlay { display: none; padding: 10px; font-size: 12px; color: var(--baemin-cyan); text-align: center; font-weight: 700; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        .card { border: 1px solid #eee; border-radius: 16px; padding: 18px; margin-bottom: 25px; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .menu-name { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #222; }
        .badge { background: #ff5e00; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }

        .basic-recipe { background: #fdfdfd; border: 1px solid #f0f0f0; border-radius: 10px; padding: 12px; margin: 10px 0; font-size: 13px; color: #555; }
        .recipe-step { margin-bottom: 4px; display: flex; gap: 6px; }
        .step-num { color: var(--baemin-cyan); font-weight: 800; }

        .link-group { display: flex; gap: 8px; margin-top: 15px; }
        .link-btn { flex: 1; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: 700; text-align: center; display: flex; align-items: center; justify-content: center; gap: 4px; border: 1px solid #eee; transition: 0.2s; }
        .yt-btn { background: #ffebee; color: var(--yt-red); }
        .search-btn-link { background: #f5f5f5; color: #555; }
        .link-btn:hover { opacity: 0.8; }

        .comment-section { background: #f9f9f9; border-radius: 12px; padding: 12px; margin-top: 15px; }
        .comment-list { max-height: 80px; overflow-y: auto; margin-bottom: 8px; font-size: 12px; }
        .comment-item { margin-bottom: 4px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
        .comment-input-group { display: flex; gap: 5px; }
        .comment-input { flex: 1; padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; outline: none; }
        .comment-add-btn { background: #333; color: white; border: none; padding: 0 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <section class="recipe-section">
        <header><h2>🍴 배민 레시피 AI 플러스</h2></header>
        
        <div class="input-zone">
            <div class="search-container">
                <input type="text" id="ing-input" placeholder="가진 재료를 입력하세요 (예: 김치, 계란)">
                <button class="search-btn" onclick="searchRecipes()">추천받기</button>
            </div>
            <button class="ai-scan-btn" onclick="simulateAIScan()">📷 냉장고 사진 찍어서 스캔하기</button>
            <div id="loading" class="loading-overlay">🌀 AI가 사진 속 재료를 분석하고 있습니다...</div>
        </div>

        <div class="scroll-area" id="recipe-list"></div>
    </section>

    <section class="community-section">
        <header><h2>💬 요리 커뮤니티</h2></header>
        <div style="padding:15px; border-bottom:1px solid #eee;">
            <textarea id="post-text" style="width:100%; height:60px; border-radius:8px; border:1px solid #ddd; padding:8px; font-size:12px; resize:none;" placeholder="오늘의 요리 팁을 공유하세요!"></textarea>
            <button onclick="addPost()" style="width:100%; background:var(--baemin-cyan); color:white; border:none; padding:8px; border-radius:8px; margin-top:5px; font-weight:700; cursor:pointer;">게시물 등록</button>
        </div>
        <div class="scroll-area" id="post-list">
            <div style="font-size:13px; border-bottom:1px solid #f9f9f9; padding:10px 0;"><b>익명</b><br>김치찌개엔 역시 돼지 앞다리살이죠!</div>
        </div>
    </section>
</div>

<script>
    // 💡 변경된 부분: 직접 이동할 수 있는 특정 유튜브 영상 주소와 레시피 블로그 주소를 넣었습니다.
    const recipes = [
        { 
            id: 0, 
            name: "백종원 김치볶음밥", 
            ings: ["김치", "계란", "밥"], 
            steps: ["대파를 볶아 파기름을 냅니다.", "김치를 넣고 볶다가 간장으로 불향을 입힙니다.", "밥을 넣고 섞은 뒤 계란을 올립니다."], 
            comments: ["이 레시피 진짜 실패가 없어요!"],
            ytUrl: "https://www.youtube.com/watch?v=e_X1XG6qAew", // 백종원 김치볶음밥 영상
            blogUrl: "https://www.10000recipe.com/recipe/6864506" // 만개의 레시피 김치볶음밥
        },
        { 
            id: 1, 
            name: "얼큰 김치찌개", 
            ings: ["김치", "돼지고기", "두부"], 
            steps: ["돼지고기를 볶다가 물을 붓습니다.", "김치와 다진 마늘을 넣고 끓입니다.", "두부를 넣고 마무리합니다."], 
            comments: ["오래 끓일수록 맛있어요."],
            ytUrl: "https://www.youtube.com/watch?v=5Vz1V1Vj710", // 백종원 김치찌개 영상
            blogUrl: "https://www.10000recipe.com/recipe/6828828" 
        },
        { 
            id: 2, 
            name: "마늘 듬뿍 알리오올리오", 
            ings: ["마늘", "파스타면", "올리브유"], 
            steps: ["올리브유에 편마늘을 노릇하게 굽습니다.", "페페론치노와 삶은 면을 넣습니다.", "면수를 추가하며 에멀전합니다."], 
            comments: ["새우 넣어도 꿀맛입니다."],
            ytUrl: "https://www.youtube.com/watch?v=LqUe61Z2vG8", 
            blogUrl: "https://www.10000recipe.com/recipe/6884025" 
        },
        { 
            id: 3, 
            name: "초간단 계란말이", 
            ings: ["계란", "대파", "소금"], 
            steps: ["계란을 풀고 다진 대파를 섞습니다.", "팬에 얇게 펴서 익힙니다.", "끝에서부터 돌돌 말아줍니다."], 
            comments: ["케첩에 찍어먹으면 밥도둑!"],
            ytUrl: "https://www.youtube.com/watch?v=7uR-_iC8Wc8", 
            blogUrl: "https://www.10000recipe.com/recipe/6925586" 
        }
    ];

    function render(data, matched = []) {
        const area = document.getElementById('recipe-list');
        area.innerHTML = data.map(r => {
            const matchCount = r.ings.filter(i => matched.includes(i)).length;
            return `
            <div class="card">
                <div class="menu-name">
                    ${r.name}
                    ${matchCount > 0 ? `<span class="badge">추천: ${matchCount}개 일치</span>` : ''}
                </div>
                <div style="margin-bottom: 10px;">
                    ${r.ings.map(i => `<span style="font-size: 11px; background:#eefaf9; color:var(--baemin-cyan); padding:2px 6px; border-radius:4px; margin-right:4px; font-weight:700;">#${i}</span>`).join('')}
                </div>
                
                <div class="basic-recipe">
                    <div style="font-weight:700; margin-bottom:5px; color:#333;">🍳 초간단 레시피</div>
                    ${r.steps.map((s, idx) => `<div class="recipe-step"><span class="step-num">${idx+1}</span> <span>${s}</span></div>`).join('')}
                </div>

                <div class="link-group">
                    <a href="${r.ytUrl}" target="_blank" class="link-btn yt-btn">▶️ 유튜브 영상 바로보기</a>
                    <a href="${r.blogUrl}" target="_blank" class="link-btn search-btn-link">📝 상세 레시피 글 보기</a>
                </div>

                <div class="comment-section">
                    <div class="comment-list" id="comments-${r.id}">
                        ${r.comments.map(c => `<div class="comment-item"><b>방문자</b>: ${c}</div>`).join('')}
                    </div>
                    <div class="comment-input-group">
                        <input type="text" id="input-${r.id}" class="comment-input" placeholder="후기를 남겨주세요...">
                        <button class="comment-add-btn" onclick="addComment(${r.id})">등록</button>
                    </div>
                </div>
            </div>
        `}).join('');
    }

    function searchRecipes() {
        const val = document.getElementById('ing-input').value;
        if(!val) { render(recipes); return; }
        const userIngs = val.split(',').map(s => s.trim());
        const filtered = recipes.map(r => {
            const count = r.ings.filter(i => userIngs.some(ui => i.includes(ui))).length;
            return { ...r, count };
        }).filter(r => r.count > 0).sort((a, b) => b.count - a.count);
        render(filtered, userIngs);
    }

    function simulateAIScan() {
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        setTimeout(() => {
            loading.style.display = 'none';
            const found = ["김치", "계란", "스팸"];
            alert("AI가 '김치, 계란, 스팸'을 발견했습니다! 맞춤 요리를 보여드릴게요.");
            const filtered = recipes.map(r => {
                const count = r.ings.filter(i => found.includes(i)).length;
                return { ...r, count };
            }).filter(r => r.count > 0).sort((a, b) => b.count - a.count);
            render(filtered, found);
        }, 1500);
    }

    function addComment(id) {
        const input = document.getElementById(`input-${id}`);
        if(!input.value) return;
        const list = document.getElementById(`comments-${id}`);
        const div = document.createElement('div');
        div.className = 'comment-item';
        div.innerHTML = `<b>나</b>: ${input.value}`;
        list.appendChild(div);
        input.value = '';
    }

    function addPost() {
        const txt = document.getElementById('post-text');
        if(!txt.value) return;
        const postList = document.getElementById('post-list');
        const div = document.createElement('div');
        div.style.cssText = "font-size:13px; border-bottom:1px solid #f9f9f9; padding:10px 0;";
        div.innerHTML = `<b>나</b><br>${txt.value}`;
        postList.prepend(div);
        txt.value = '';
    }

    render(recipes);
</script>

</body>
</html>
